name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
    - name: Fix repository permissions
      run: |
        sudo chown -R "$(id -un)":"$(id -gn)" /opt/rpmcukstore
        git config --global --add safe.directory /opt/rpmcukstore

    - name: Pull latest code
      run: |
        cd /opt/rpmcukstore
        git fetch origin main
        git reset --hard origin/main
        git clean -fd

    - name: Install composer dependencies
      run: |
        cd /opt/rpmcukstore
        composer install --no-dev --no-scripts --optimize-autoloader

    - name: Package discover
      run: |
        cd /opt/rpmcukstore
        php artisan package:discover --ansi

    - name: Build assets
      run: |
        cd /opt/rpmcukstore
        npm ci && npm run build

    - name: Run migrations
      run: |
        cd /opt/rpmcukstore
        php artisan migrate --force

    - name: Optimize
      run: |
        cd /opt/rpmcukstore
        php artisan optimize
